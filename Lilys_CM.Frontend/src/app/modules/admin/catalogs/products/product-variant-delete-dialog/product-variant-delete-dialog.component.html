<div class="delete-dialog">
  <div class="dialog-icon">
    <mat-icon>warning</mat-icon>
  </div>

  <h2 mat-dialog-title>Obrisati varijantu?</h2>

  <mat-dialog-content>
    <p>
      Da li ste sigurni da želite obrisati ovu varijantu?
    </p>

    <div class="variant-preview" *ngIf="data?.variantLabel">
      {{ data.variantLabel }}
    </div>

    <p class="warning-text">
      Ova akcija se ne može poništiti.
    </p>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button type="button" mat-stroked-button mat-dialog-close>
      Odustani
    </button>

    <button
      type="button"
      mat-raised-button
      color="warn"
      [mat-dialog-close]="true"
    >
      <mat-icon>delete</mat-icon>
      Obriši
    </button>
  </mat-dialog-actions>
</div>
