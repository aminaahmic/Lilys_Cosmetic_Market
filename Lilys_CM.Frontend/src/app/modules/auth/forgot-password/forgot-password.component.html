<div class="auth-container">
  <div class="auth-content">
    <div class="auth-brand">
      <mat-icon class="brand-icon">lock_reset</mat-icon>
      <h1 class="brand-name">Lilys Cosmetic Market</h1>
      <p class="brand-tagline">Obnova lozinke</p>
    </div>

    <mat-card class="auth-card mat-elevation-z8">
      <mat-card-header>
        <mat-card-title>Zaboravili ste lozinku?</mat-card-title>
        <mat-card-subtitle>Unesite email i generišite reset token</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input
              matInput
              formControlName="email"
              type="email"
              placeholder="vasa.email@primjer.com"
              autocomplete="email"
            />
            <mat-icon matPrefix>mail</mat-icon>
            <mat-error *ngIf="form.get('email')?.hasError('required')">
              Email je obavezan
            </mat-error>
            <mat-error *ngIf="form.get('email')?.hasError('email')">
              Unesite validan email
            </mat-error>
          </mat-form-field>

          <div class="actions">
            <button
              mat-raised-button
              color="primary"
              type="submit"
              class="submit-button"
              [disabled]="form.invalid || isLoading"
            >
              <ng-container *ngIf="!isLoading; else loadingTpl">
                <mat-icon>send</mat-icon>
                Nastavi
              </ng-container>
              <ng-template #loadingTpl>
                <mat-progress-spinner mode="indeterminate" diameter="20" strokeWidth="3"></mat-progress-spinner>
                <span>Obrada...</span>
              </ng-template>
            </button>
          </div>

          <div class="register-prompt">
            <a routerLink="/auth/login" class="register-link">Nazad na prijavu</a>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
